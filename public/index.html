<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Croustillant - Gérez vos recettes et générez des listes de courses">
    <title>Croustillant - Mes Recettes</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <a href="#app" class="skip-link">Aller au contenu principal</a>
    <header>
        <nav aria-label="Navigation principale">
            <h1>🍳 Croustillant</h1>
            <ul>
                <li><a href="/" class="nav-link active" data-page="recipes">Recettes</a></li>
                <li><a href="/create" class="nav-link" data-page="create">Ajouter</a></li>
                <li>
                    <a href="/selection" class="nav-link" data-page="selection">
                        Ma sélection
                        <span class="badge" id="selection-count">0</span>
                    </a>
                </li>
                <li><a href="/shopping" class="nav-link" data-page="shopping">Liste de courses</a></li>
            </ul>
        </nav>
    </header>

    <main id="app" role="main" tabindex="-1">
        <!-- Content will be dynamically loaded here -->
        <div class="loading">
            <div class="spinner"></div>
        </div>
    </main>

    <!-- Recipe Detail Modal -->
    <div id="recipe-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-recipe-title" aria-hidden="true">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-recipe-title"></h2>
                <button type="button" class="modal-close" onclick="closeModal()" aria-label="Fermer la recette">&times;</button>
            </div>
            <div id="modal-recipe-content"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/config.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/storage.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/components/recipes-list.js"></script>
    <script src="/js/components/recipe-detail.js"></script>
    <script src="/js/components/recipe-form.js"></script>
    <script src="/js/components/selection.js"></script>
    <script src="/js/components/shopping-list.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
