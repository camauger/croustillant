[build]
  # Netlify exécute déjà `npm install` si package.json est présent (nécessaire pour bundler les fonctions).
  command = "echo ok"
  publish = "public"
  functions = "netlify/functions"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[dev]
  # Disable Edge Functions - this project only uses Python Netlify Functions
  # This prevents Netlify CLI from trying to set up Deno
  edge_functions = []

# Note: This project uses Python Netlify Functions, not Edge Functions
# Production: Node.js functions in netlify/functions/*.mjs (Netlify ne déploie pas Python).
# Dev local Python: netlify/functions-python/ (scripts/local_dev_server.py).

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
